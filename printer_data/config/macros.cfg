[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customize for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    # G1 E-4.0 F3600                 ; retract filament
    G91                            ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G90                            ; absolute positioning
    G0 X114.5 Y{max_y-10} F3600          ; park nozzle at rear

[gcode_macro END_PRINT]
description: PRINT_END Alias
gcode:
  PRINT_END {rawparams}

[delayed_gcode countdown_5min]
initial_duration: 0
gcode:
    # Get current remaining seconds or set to 300 (5 mins)
    {% set remaining = printer["gcode_macro _COUNTDOWN_VARS"].remaining|default(300)|int %}
    
    {% if remaining > 0 %}
        # Update display/console
        M117 Time: { (remaining / 60)|int }m { (remaining % 60) }s
        SET_DISPLAY_TEXT MSG= Time: { (remaining / 60)|int }m { (remaining % 60) }s
        # Optional: Log to console
        # RESPOND MSG="Remaining: { (remaining / 60)|int }m { (remaining % 60) }s"                
        
        # Set new remaining time
        SET_GCODE_VARIABLE MACRO=_COUNTDOWN_VARS VARIABLE=remaining VALUE={remaining - 1}                
        
        # Run again in 1 second
        UPDATE_DELAYED_GCODE ID=countdown_5min DURATION=1
    {% else %}
        M117 5 Min Done!
        RESPOND MSG="5-minute countdown finished."
    {% endif %}

# Helper macro to store the state
[gcode_macro _COUNTDOWN_VARS]
variable_remaining: 300
gcode:
    # Do nothing

# Macro to trigger the countdown
[gcode_macro START_5MIN_COUNTDOWN]
gcode:
    SET_GCODE_VARIABLE MACRO=_COUNTDOWN_VARS VARIABLE=remaining VALUE=300
    UPDATE_DELAYED_GCODE ID=countdown_5min DURATION=1

[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}
  
#####################################################################
# Filament Macros
#####################################################################

[gcode_macro LOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E30 F300                    ; load
   G1 E15 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E10 F300                    ; extrude a little to soften tip
   G1 E-40 F1800                  ; retract some, but not too much or it will jam
   M82                            ; set extruder to absolute

   [gcode_macro COLOR_CHANGE]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state