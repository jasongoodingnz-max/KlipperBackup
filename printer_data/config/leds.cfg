[led_effect left_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:caselight (1-7)
layers:
    static 1 0 top (1,1,1)
    
[led_effect right_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:caselight (14-20)
layers:
    static 1 0 top (1,1,1)

[led_effect centre_leds]
autostart:              false
frame_rate:             24
leds:
    neopixel:caselight (8-13)
layers:
    static 1 0 top (1,1,1)

[led_effect Homing]
autostart:              false
frame_rate:             24
leds:
    neopixel:caselight
layers:
    breathing  10 1 top (0.0, 0.0, 1.0) # Blue breathing

[led_effect Caselight_On]
leds: neopixel:caselight
layers: static 1 0 top (1,1,1)

[led_effect bed_heating]
leds:
    neopixel:caselight
autostart:                          false
frame_rate:                         24
heater:                             heater_bed
layers:
    # This creates a 'fire' effect that intensifies as temp rises
    heater  10.00  0.00  add    (0.5, 0.0, 0.0),(1.0, 0.3, 0.0),(1.0, 0.8, 0.0)
    # This adds a subtle breathing pulse to the background
    breathing  10.00  0.00  add    (0.2, 0.0, 0.0)

[led_effect bed_leveling]
leds:
    neopixel:caselight
autostart:                          false
frame_rate:                         24
layers:
    # A teal/cyan comet that scans across the strip
    comet  0.30  1.00  add    (0.0, 0.8, 1.0),(0.0, 0.2, 0.5)
    # A dim white background glow so the printer isn't pitch black
    static 0.00  0.00  add    (0.05, 0.05, 0.05)

[led_effect printing_progress]
leds:
    neopixel:caselight (8-13)
autostart:                          false
frame_rate:                         24
layers:
    # Layer 1: The Progress Bar (Blue)
    # This fills from the first LED to the last based on print completion
    progress  -1.00  0.00  add    (0.0, 0.5, 1.0),(0.0, 0.1, 0.6)
    
    # Layer 2: Subtle Background (Dim White)
    # This keeps the rest of the strip visible at 5% brightness
    static     0.00  0.00  add    (0.05, 0.05, 0.05)

[led_effect homing_caution]
leds:
    neopixel:caselight
autostart:                          false
frame_rate:                         24
layers:
    # Comet (Speed, Tail Length, Add/Top)
    # A positive speed moves it one way; the plugin handles the loop.
    comet  0.40  1.00  add    (1.0, 0.5, 0.0),(0.5, 0.2, 0.0)

